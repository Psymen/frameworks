<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment & Startup Frameworks</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --green: #3fb950;
            --search-bg: #0d1117;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .search-container {
            position: relative;
        }

        #search {
            width: 100%;
            padding: 8px 12px 8px 36px;
            background: var(--search-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        #search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        .search-count {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 12px;
        }

        .layout {
            display: flex;
            min-height: calc(100vh - 90px);
        }

        nav {
            width: 280px;
            min-width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 16px 0;
            overflow-y: auto;
            height: calc(100vh - 90px);
            position: sticky;
            top: 90px;
        }

        nav a {
            display: block;
            padding: 6px 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            border-left: 2px solid transparent;
            transition: all 0.15s;
        }

        nav a:hover {
            color: var(--text);
            background: rgba(88, 166, 255, 0.05);
        }

        nav a.active {
            color: var(--accent);
            border-left-color: var(--accent);
            background: rgba(88, 166, 255, 0.08);
        }

        main {
            flex: 1;
            padding: 32px 48px;
            max-width: 900px;
        }

        .inspiration {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 40px;
        }

        .inspiration blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 16px;
            margin: 12px 0;
            color: var(--text-muted);
            font-style: italic;
        }

        .inspiration blockquote strong {
            color: var(--text);
        }

        .inspiration .attribution {
            color: var(--accent);
            font-weight: 600;
            font-style: normal;
        }

        .framework {
            margin-bottom: 48px;
            scroll-margin-top: 100px;
        }

        .framework-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .framework-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .framework-header h2 a {
            color: var(--accent);
            text-decoration: none;
        }

        .framework-header h2 a:hover {
            text-decoration: underline;
        }

        .framework-header .source {
            font-size: 12px;
            color: var(--text-muted);
        }

        .framework-header .source a {
            color: var(--text-muted);
            text-decoration: none;
        }

        .framework-header .source a:hover {
            color: var(--accent);
        }

        .checklist {
            list-style: none;
            padding: 0;
        }

        .checklist li {
            padding: 4px 0 4px 20px;
            position: relative;
            color: var(--text);
            font-size: 14px;
        }

        .checklist li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 11px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .checklist .category-label {
            font-weight: 600;
            color: var(--accent);
            margin-top: 12px;
        }

        .checklist .category-label::before {
            display: none;
        }

        .checklist .sub-item {
            padding-left: 40px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .checklist .sub-item::before {
            left: 20px;
            width: 4px;
            height: 4px;
            background: var(--border);
        }

        .checklist .sub-sub-item {
            padding-left: 60px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .checklist .sub-sub-item::before {
            left: 40px;
            width: 4px;
            height: 4px;
            background: var(--border);
        }

        .section-heading {
            font-size: 15px;
            font-weight: 600;
            color: var(--green);
            margin: 16px 0 8px 0;
            padding: 4px 0;
        }

        .subsection-heading {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin: 12px 0 6px 20px;
        }

        mark {
            background: rgba(88, 166, 255, 0.25);
            color: var(--text);
            border-radius: 2px;
            padding: 0 2px;
        }

        .hidden {
            display: none !important;
        }

        .other-collections {
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .other-collections h2 {
            font-size: 1.1rem;
            margin-bottom: 12px;
        }

        .other-collections a {
            color: var(--accent);
            text-decoration: none;
        }

        .other-collections a:hover {
            text-decoration: underline;
        }

        .back-to-top {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.15s;
        }

        .back-to-top:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .back-to-top.visible {
            display: flex;
        }

        @media (max-width: 768px) {
            nav { display: none; }
            main { padding: 20px 16px; }
            .layout { display: block; }
        }
    </style>
</head>

</header>

</div>

// Render
function render() {
    const main = document.getElementById('content');
    const nav = document.getElementById('sidebar');

    let html = '';

    // Inspiration
    html += '<div class="inspiration"><h3 style="margin-bottom:12px;color:var(--text-muted);font-size:13px;text-transform:uppercase;letter-spacing:1px;">Inspiration</h3>';
    DATA.inspiration.forEach(q => {
        html += `<blockquote>${q.quote}<br><span class="attribution">\u2014 ${q.author}</span></blockquote>`;
    });
    html += '</div>';

    // Frameworks
    let navHtml = '';
    DATA.frameworks.forEach(fw => {
        navHtml += `<a href="#${fw.id}" data-id="${fw.id}">${fw.name}</a>`;
        html += renderFramework(fw);
    });

    // Other Collections
    html += '<div class="other-collections"><h2>Other Collections</h2>';
    DATA.otherCollections.forEach(c => {
        html += `<p><a href="${c.url}" target="_blank" rel="noopener">${c.name}</a>`;
        if (c.sourceUrl) html += ` (<a href="${c.sourceUrl}" target="_blank" rel="noopener">Source</a>)`;
        html += '</p>';
    });
    html += '</div>';

    main.innerHTML = html;
    nav.innerHTML = navHtml;
}

function renderFramework(fw) {
    let html = `<div class="framework" id="${fw.id}">`;
    html += '<div class="framework-header">';
    html += `<h2>${fw.url ? `<a href="${fw.url}" target="_blank" rel="noopener">${fw.name}</a>` : fw.name}</h2>`;
    if (fw.sourceUrl) html += ` <span class="source">(<a href="${fw.sourceUrl}" target="_blank" rel="noopener">Source</a>)</span>`;
    html += '</div>';

    if (fw.items) {
        html += '<ul class="checklist">';
        fw.items.forEach((item, i) => {
            html += `<li>${item}</li>`;
            if (fw.subitems && fw.subitems[i]) {
                fw.subitems[i].forEach(sub => {
                    html += `<li class="sub-item">${sub}</li>`;
                });
            }
        });
        html += '</ul>';
    }

    if (fw.sections) {
        fw.sections.forEach(sec => {
            html += `<div class="section-heading">${sec.heading}</div>`;
            if (sec.subsections) {
                sec.subsections.forEach(sub => {
                    html += `<div class="subsection-heading">${sub.subheading}</div>`;
                    html += '<ul class="checklist">';
                    sub.items.forEach(item => {
                        html += `<li class="sub-item">${item}</li>`;
                    });
                    html += '</ul>';
                });
            }
            if (sec.items) {
                html += '<ul class="checklist">';
                sec.items.forEach(item => {
                    html += `<li>${item}</li>`;
                });
                html += '</ul>';
            }
        });
    }

    html += '</div>';
    return html;
}

// Search
function initSearch() {
    const input = document.getElementById('search');
    const countEl = document.getElementById('searchCount');

    input.addEventListener('input', () => {
        const q = input.value.toLowerCase().trim();
        const frameworks = document.querySelectorAll('.framework');
        let visible = 0;

        if (!q) {
            frameworks.forEach(fw => fw.classList.remove('hidden'));
            countEl.textContent = '';
            clearHighlights();
            return;
        }

        clearHighlights();

        frameworks.forEach(fw => {
            const text = fw.textContent.toLowerCase();
            if (text.includes(q)) {
                fw.classList.remove('hidden');
                visible++;
                highlightText(fw, q);
            } else {
                fw.classList.add('hidden');
            }
        });

        countEl.textContent = `${visible} framework${visible !== 1 ? 's' : ''}`;
    });
}

function highlightText(el, query) {
    const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
    const nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);

    nodes.forEach(node => {
        const text = node.textContent;
        const lower = text.toLowerCase();
        const idx = lower.indexOf(query);
        if (idx === -1) return;
        if (node.parentElement.tagName === 'MARK') return;

        const before = text.substring(0, idx);
        const match = text.substring(idx, idx + query.length);
        const after = text.substring(idx + query.length);

        const frag = document.createDocumentFragment();
        if (before) frag.appendChild(document.createTextNode(before));
        const mark = document.createElement('mark');
        mark.textContent = match;
        frag.appendChild(mark);
        if (after) frag.appendChild(document.createTextNode(after));

        node.parentNode.replaceChild(frag, node);
    });
}

function clearHighlights() {
    document.querySelectorAll('mark').forEach(mark => {
        const parent = mark.parentNode;
        parent.replaceChild(document.createTextNode(mark.textContent), mark);
        parent.normalize();
    });
}

// Active nav on scroll
function initScrollSpy() {
    const links = document.querySelectorAll('nav a');
    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                links.forEach(l => l.classList.remove('active'));
                const link = document.querySelector(`nav a[data-id="${entry.target.id}"]`);
                if (link) link.classList.add('active');
            }
        });
    }, { rootMargin: '-100px 0px -60% 0px' });

    document.querySelectorAll('.framework').forEach(fw => observer.observe(fw));
}

// Back to top
function initBackToTop() {
    const btn = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
        btn.classList.toggle('visible', window.scrollY > 400);
    });
    btn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
}

// Init
render();
initSearch();
initScrollSpy();
initBackToTop();
